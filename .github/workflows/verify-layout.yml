name: verify-layout

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project and development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Verify repository layout
        run: python scripts/verify_layout.py
      - name: Compile Python sources
        run: python -m compileall -q src scripts tests
      - name: Run tests
        run: pytest
