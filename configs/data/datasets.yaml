schema_version: 2

registry: metadata/dataset_registry.yaml
survey_report: docs/dataset-survey.md
sample_index_schema: data/indexes/manifest.schema.json

# 只启用本地已完成许可快照、完整性校验和用途限制登记的数据集。
enabled:
  - id: lost-and-found
    scope: local_noncommercial_visualization_and_validation
    sample_config: configs/data/task4_samples.yaml
    license_snapshot: metadata/licenses/lost-and-found-2026-07-16.md
  - id: segment-me-if-you-can
    scope: road_obstacle_21_visualization_and_evaluation_only
    sample_config: configs/data/task4_samples.yaml
    license_snapshot: metadata/licenses/road-obstacle-21-2026-07-16.md

research:
  reviewed_on: 2026-07-16
  candidate_count: 7

recommended_plan:
  drivable_area_baseline:
    preferred_after_license_clearance:
      - bdd100k
    noncommercial_alternative:
      - cityscapes
  small_obstacle_validation:
    - lost-and-found
  anomaly_evaluation:
    - fishyscapes
    - road-anomaly-21
    - segment-me-if-you-can
  cross_region_generalization:
    - mapillary-vistas

download_gate:
  require_current_license_snapshot: true
  require_responsible_owner_approval: true
  require_expected_files_and_sha256_plan: true
  require_storage_budget: true
  require_sequence_level_split_plan: true

split_policy:
  unit: sequence_or_scene
  prevent_adjacent_frame_leakage: true
